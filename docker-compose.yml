services:
  app:
    image: ghcr.io/yeluonight/cf-manager:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:80"
    environment:
      - PORT=3001
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - API_SECRET=${API_SECRET}
      - PROXY_URL=${PROXY_URL:-}
      - DB_PATH=/app/data/cf-manager.db
    volumes:
      - cf-data:/app/data

volumes:
  cf-data:
    driver: local
