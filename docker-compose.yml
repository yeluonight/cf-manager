services:
  app:
    image: ghcr.io/yeluonight/cf-manager:latest
    restart: unless-stopped
    ports:
      - "3000:80"           # 宿主机端口:容器端口，按需修改左侧端口
    environment:
      ENCRYPTION_KEY: changeme   # 必填，API Token 加密密钥，生成: openssl rand -hex 32
      API_SECRET: changeme      # 必填，管理面板访问密码，生成: openssl rand -hex 32
      PROXY_URL: ""             # 可选，CF API 代理地址，如 http://127.0.0.1:7890
      DB_PATH: /data/cf-manager.db
      CORS_ORIGINS: ""          # 可选，前端跨域白名单，如 https://cf.example.com
    volumes:
      - cf-data:/data           # 数据持久化，SQLite 数据库存放目录

volumes:
  cf-data:
    driver: local
