services:
  app:
    image: ghcr.io/yeluonight/cf-manager:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:80"
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?请设置ENCRYPTION_KEY}
      - API_SECRET=${API_SECRET:?请设置API_SECRET}
      - PROXY_URL=${PROXY_URL:-}
      - DB_PATH=/app/data/cf-manager.db
      - CORS_ORIGINS=${CORS_ORIGINS:-}
    volumes:
      - cf-data:/app/data

volumes:
  cf-data:
    driver: local
