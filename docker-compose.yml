services:
  app:
    image: ghcr.io/yeluonight/cf-manager:latest
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      ENCRYPTION_KEY: changeme
      API_SECRET: changeme
      PROXY_URL: ""
      DB_PATH: /data/cf-manager.db
      CORS_ORIGINS: ""
    volumes:
      - cf-data:/data

volumes:
  cf-data:
    driver: local
